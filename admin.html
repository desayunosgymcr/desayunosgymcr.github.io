<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Panel de Tati · Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF7EE;--surface:#FFFFFF;--ink:#2A1A12;--ink-2:#7A5B49;--ink-3:#B39C8C;
  --line:#F1E4D6;--line-2:#E7D5C3;--cream-soft:#FFF0DF;
  --orange:#F4623A;--orange-d:#D9491F;--amber:#F79A22;--green:#12A56A;--green-d:#0E8656;
  --blue:#3B82F6;--grape:#8A5CF6;--berry:#E8467C;
  --r:20px;--r-sm:13px;--tr:.2s ease;--shadow:0 2px 4px rgba(146,64,14,.05),0 12px 30px rgba(146,64,14,.08);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:60px}
h1,h2{font-family:'Fraunces',serif}
.mono{font-family:'Space Grotesk',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px}

/* NAV */
.nav{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 20px;background:rgba(255,247,238,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;font-family:'Fraunces';font-weight:700;font-size:1.1rem}
.brand .mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--ink),#4A2A15);color:#fff;display:grid;place-items:center;font-size:1.1rem}
.brand small{display:block;font-family:'Inter';font-weight:500;font-size:.7rem;color:var(--ink-3);margin-top:-3px}
.nav a.link{font-size:.85rem;font-weight:600;color:var(--ink-2);border:1px solid var(--line-2);padding:8px 14px;border-radius:50px;background:#fff}
.nav a.link:hover{border-color:var(--orange);color:var(--orange-d)}
.cloud-badge{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;font-weight:700;padding:5px 12px;border-radius:50px;border:1px solid var(--line-2);background:#fff}
.cloud-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
.cloud-badge.on{color:var(--green-d);border-color:#B9E7CF;background:#E6F5EE}
.cloud-badge.on .dot{background:var(--green-d);box-shadow:0 0 0 3px rgba(18,165,106,.2)}

/* HEADER */
.head{padding:30px 0 8px}
.head h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700}
.head p{color:var(--ink-2);margin-top:6px;font-size:.95rem}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px 18px;box-shadow:var(--shadow)}
.stat .k{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.stat .v{font-family:'Space Grotesk';font-weight:700;font-size:1.9rem;margin-top:4px}
.stat.money .v{color:var(--green-d)}
.stat.count .v{color:var(--orange-d)}

/* TOOLBAR */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:6px 0 18px}
.toolbar input,.toolbar select{padding:10px 14px;border:1.5px solid var(--line-2);border-radius:50px;font-size:.88rem;background:#fff;color:var(--ink)}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--orange)}
.toolbar .search{flex:1;min-width:160px}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:.85rem;padding:10px 16px;border-radius:50px;transition:var(--tr);white-space:nowrap}
.btn-dark{background:var(--ink);color:#fff}.btn-dark:hover{background:#000}
.btn-out{background:#fff;color:var(--ink);border:1.5px solid var(--line-2)}.btn-out:hover{border-color:var(--orange);color:var(--orange-d)}
.btn-danger{background:#fff;color:#C4362F;border:1.5px solid #F3C9C6}.btn-danger:hover{background:#FBEBEA}

/* ORDERS */
.orders{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.order{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.o-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--cream-soft)}
.o-av{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--grape),var(--berry));color:#fff;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;flex:none}
.o-who{flex:1;min-width:0}
.o-who .n{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.o-who .d{font-size:.76rem;color:var(--ink-3)}
.o-total{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;color:var(--green-d)}
.o-body{padding:12px 16px;flex:1}
.o-item{display:flex;justify-content:space-between;font-size:.86rem;padding:4px 0;color:var(--ink-2)}
.o-item b{color:var(--ink);font-weight:600}
.o-note{margin-top:8px;font-size:.8rem;color:var(--ink-2);background:var(--bg);border-radius:9px;padding:8px 10px;border:1px solid var(--line)}
.o-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 16px;border-top:1px solid var(--line)}
.badge{font-size:.72rem;font-weight:700;padding:4px 11px;border-radius:50px}
.b-whatsapp{background:#E3F7EC;color:#0E8656}.b-correo{background:#E5EEFF;color:#2563EB}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:700;padding:5px 11px;border-radius:50px;border:1.5px solid var(--line-2);background:#fff;cursor:pointer}
.pill.pendiente{color:var(--amber);border-color:#F6D9A6;background:#FDF4E3}
.pill.pagado{color:var(--green-d);border-color:#B9E7CF;background:#E6F5EE}
.pill.entregado{color:var(--grape);border-color:#D9CBFB;background:#F1EAFE}

.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.empty .big{font-size:3rem;margin-bottom:10px}
.note-src{font-size:.78rem;color:var(--ink-3);margin:14px 0 4px}
.note-src b{color:var(--ink-2)}

/* GATE */
.gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:28px;max-width:360px;width:100%;text-align:center;box-shadow:var(--shadow)}
.gate-card .ico{font-size:2.4rem}
.gate-card h2{font-size:1.4rem;margin:10px 0 4px}
.gate-card p{color:var(--ink-2);font-size:.88rem;margin-bottom:16px}
.gate-card input{width:100%;padding:13px 16px;border:1.5px solid var(--line-2);border-radius:var(--r-sm);font-size:1.1rem;text-align:center;letter-spacing:.3em;margin-bottom:12px}
.gate-card input:focus{outline:none;border-color:var(--orange)}
.gate-err{color:#C4362F;font-size:.82rem;min-height:1.1em;margin-bottom:8px}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:#fff;padding:12px 20px;border-radius:50px;font-size:.86rem;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.3s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .stats{grid-template-columns:1fr;gap:10px}
  .stat{display:flex;align-items:baseline;justify-content:space-between}
  .stat .v{font-size:1.5rem}
  .wrap{padding:0 15px}
}
@media print{
  .nav,.toolbar,.gate,.o-foot .pill,.btn{display:none!important}
  body{background:#fff}
  .order{break-inside:avoid;box-shadow:none}
}
</style>
</head>
<body>

<!-- GATE (protección básica, no es seguridad real) -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="ico">🔒</div>
    <h2>Panel de Tati</h2>
    <p>Ingresá el código para ver los pedidos.</p>
    <input id="pin" type="password" inputmode="numeric" placeholder="••••" maxlength="12" autocomplete="off">
    <div class="gate-err" id="pinErr"></div>
    <button class="btn btn-dark" style="width:100%;justify-content:center" onclick="tryPin()">Entrar</button>
  </div>
</div>

<nav class="nav">
  <div class="brand"><span class="mark">📋</span><span>Panel de Tati<small>Pedidos finalizados</small></span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="cloud-badge" id="cloudBadge"><span class="dot"></span> Modo local</span>
    <a class="link" href="./index.html">← Ir a la página de pedidos</a>
  </div>
</nav>

<div class="wrap">
  <div class="head">
    <h1>Pedidos finalizados</h1>
    <p>Revisá los pedidos, marcá su estado y exportá el registro.</p>
  </div>

  <div class="stats">
    <div class="stat count"><div class="k">Pedidos</div><div class="v" id="stCount">0</div></div>
    <div class="stat money"><div class="k">Total ₡</div><div class="v" id="stTotal">₡0</div></div>
    <div class="stat"><div class="k">Ítems</div><div class="v" id="stItems">0</div></div>
  </div>

  <div class="toolbar">
    <input class="search" id="search" type="text" placeholder="🔎 Buscar por nombre…" oninput="renderOrders()">
    <select id="fEstado" onchange="renderOrders()">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="pagado">Pagado</option>
      <option value="entregado">Entregado</option>
    </select>
    <select id="fSort" onchange="renderOrders()">
      <option value="new">Más recientes</option>
      <option value="old">Más antiguos</option>
      <option value="hi">Mayor total</option>
    </select>
    <button class="btn btn-dark" onclick="exportJson()">💾 Exportar pedidos.json</button>
    <label class="btn btn-out" style="cursor:pointer">📂 Importar
      <input type="file" accept=".json" style="display:none" onchange="importJson(event)"></label>
    <button class="btn btn-danger" onclick="clearLocal()">🗑️ Limpiar registro del dispositivo</button>
  </div>

  <p class="note-src" id="srcNote"></p>
  <div id="ordersHost"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====== Config ====== */
const ADMIN_PIN = "1234";      // cambialo por el que quieras (es protección básica, no seguridad real)
const LS_KEY = "pedidos_finalizados";

let serverOrders = [];   // vienen de pedidos.json
let localOrders = [];    // vienen del localStorage de este dispositivo

/* ====== Gate ====== */
function tryPin(){
  const v=document.getElementById("pin").value.trim();
  if(v===ADMIN_PIN){
    document.getElementById("gate").style.display="none";
    boot();
  }else{
    document.getElementById("pinErr").textContent="Código incorrecto";
    document.getElementById("pin").value="";
  }
}
document.getElementById("pin").addEventListener("keydown",e=>{ if(e.key==="Enter") tryPin(); });

/* ====== Boot ====== */
async function boot(){
  try{
    const res=await fetch("./pedidos.json?nocache="+Date.now(),{cache:"no-store"});
    if(res.ok){ const d=await res.json(); serverOrders = Array.isArray(d.pedidos)?d.pedidos:[]; }
  }catch(e){ serverOrders=[]; }
  try{ localOrders = JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch(e){ localOrders=[]; }
  renderOrders();
}

function money(n){ return "₡"+Number(n||0).toLocaleString("es-CR"); }
function initials(n){ n=(n||"").trim(); return n?n.slice(0,2).toUpperCase():"?"; }
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* Une server + local + nube (Firebase), evitando duplicados por id.
   La nube manda si un pedido está en más de una fuente, por ser la más al día. */
function allOrders(){
  const map=new Map();
  serverOrders.forEach(o=>map.set(o.id,{...o,_src:"servidor"}));
  localOrders.forEach(o=>map.set(o.id,{...map.get(o.id),...o,_src:"dispositivo"}));
  (window.firebaseOrders||[]).forEach(o=>map.set(o.id,{...map.get(o.id),...o,_src:"nube"}));
  return [...map.values()];
}

function renderOrders(){
  let list=allOrders();
  const q=(document.getElementById("search").value||"").trim().toLowerCase();
  const fe=document.getElementById("fEstado").value;
  const sort=document.getElementById("fSort").value;
  if(q) list=list.filter(o=>(o.persona||"").toLowerCase().includes(q));
  if(fe) list=list.filter(o=>(o.estado||"pendiente")===fe);
  list.sort((a,b)=>{
    if(sort==="hi") return (b.total||0)-(a.total||0);
    const da=new Date(a.fecha||0), db=new Date(b.fecha||0);
    return sort==="old" ? da-db : db-da;
  });

  // stats (sobre lista filtrada)
  document.getElementById("stCount").textContent=list.length;
  document.getElementById("stTotal").textContent=money(list.reduce((s,o)=>s+(o.total||0),0));
  document.getElementById("stItems").textContent=list.reduce((s,o)=>s+((o.items||[]).reduce((a,i)=>a+(i.qty||0),0)),0);

  const host=document.getElementById("ordersHost");
  const cloudN=(window.firebaseOrders||[]).length;
  document.getElementById("srcNote").innerHTML =
    `Mostrando <b>${serverOrders.length}</b> de pedidos.json, <b>${localOrders.length}</b> de este dispositivo`+
    (cloudN?` y <b>${cloudN}</b> de la nube (en vivo, de todos los celulares).`:` · nube no configurada — solo ves lo de este dispositivo.`);

  if(list.length===0){
    host.innerHTML=`<div class="empty"><div class="big">🗒️</div>No hay pedidos que mostrar.<br>Cuando alguien finalice un pedido en este dispositivo aparecerá aquí,<br>o cargá un <b>pedidos.json</b> con el botón Importar.</div>`;
    return;
  }
  host.className="orders";
  host.innerHTML=list.map(o=>{
    const est=o.estado||"pendiente";
    const items=(o.items||[]).map(i=>`<div class="o-item"><span>${i.qty}× ${esc(i.name)}</span><b>${money(i.subtotal!=null?i.subtotal:(i.price||0)*(i.qty||0))}</b></div>`).join("");
    return `<div class="order">
      <div class="o-head">
        <div class="o-av">${initials(o.persona)}</div>
        <div class="o-who"><div class="n">${esc(o.persona||"Sin nombre")}</div><div class="d">${esc(o.fechaTexto||o.fecha||"")}</div></div>
        <div class="o-total">${money(o.total)}</div>
      </div>
      <div class="o-body">
        ${items||'<div class="o-item">Sin ítems</div>'}
        ${o.nota?`<div class="o-note">📝 ${esc(o.nota)}</div>`:""}
      </div>
      <div class="o-foot">
        <span class="badge ${o.via==='correo'?'b-correo':'b-whatsapp'}">${o.via==='correo'?'✉️ correo':'📲 whatsapp'}</span>
        <span class="pill ${est}" onclick="cycleEstado('${o.id}')" title="Tocá para cambiar">${est}</span>
      </div>
    </div>`;
  }).join("");
}

/* Cambiar estado: si el pedido vive en la nube se actualiza ahí (y se ve
   en todos los dispositivos); si es local, se actualiza en este dispositivo;
   si viene solo de pedidos.json, hay que editarlo a mano en el archivo. */
function cycleEstado(id){
  const order=["pendiente","pagado","entregado"];
  const found=allOrders().find(o=>o.id===id);
  if(!found) return;
  const cur=found.estado||"pendiente";
  const next=order[(order.indexOf(cur)+1)%order.length];

  if(found._src==="nube" && window.__firebaseUpdateEstado){
    window.__firebaseUpdateEstado(id,next).catch(()=>toast("No se pudo actualizar en la nube"));
    return; // onSnapshot re-renderiza solo cuando el cambio llega
  }
  const idx=localOrders.findIndex(o=>o.id===id);
  if(idx<0){ toast("Este pedido viene de pedidos.json — editá su estado en el archivo"); return; }
  localOrders[idx].estado=next;
  localStorage.setItem(LS_KEY,JSON.stringify(localOrders));
  renderOrders();
}

/* Exportar: junta server + local en un pedidos.json descargable */
function exportJson(){
  const merged=allOrders().map(({_src,...o})=>o);
  const data={actualizado:new Date().toISOString(),pedidos:merged};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="pedidos.json";a.click();
  toast("pedidos.json exportado 💾");
}

function importJson(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    serverOrders = Array.isArray(d.pedidos)?d.pedidos:(Array.isArray(d)?d:[]);
    renderOrders(); toast("Pedidos cargados ✅");
  }catch(e){ toast("Archivo inválido"); } };
  r.readAsText(f);
  ev.target.value="";
}

function clearLocal(){
  if(!confirm("¿Borrar los pedidos guardados en ESTE dispositivo? (no afecta pedidos.json)")) return;
  localOrders=[]; localStorage.removeItem(LS_KEY); renderOrders(); toast("Registro del dispositivo limpiado");
}

let toastT;
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2600);}

/* auto-focus PIN */
document.getElementById("pin").focus();

window.firebaseOrders = [];
</script>

<!-- ====== Firebase (opcional) ======
     Si configuraste firebase-config.js, el panel escucha en vivo la colección
     "pedidos" y se actualiza solo apenas alguien finaliza un pedido en
     cualquier celular — sin recargar la página. -->
<script src="./firebase-config.js"></script>
<script type="module">
  try{
    const cfg = window.FIREBASE_CONFIG;
    if(cfg && cfg.apiKey && !cfg.apiKey.startsWith("TU_")){
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, collection, onSnapshot, doc, updateDoc } =
        await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = initializeApp(cfg);
      const db = getFirestore(app);

      window.__firebaseUpdateEstado = async function(id, estado){
        await updateDoc(doc(db,"pedidos",id), { estado });
      };

      onSnapshot(collection(db,"pedidos"), snap=>{
        window.firebaseOrders = snap.docs.map(d=>({ id:d.id, ...d.data() }));
        const badge=document.getElementById("cloudBadge");
        badge.classList.add("on"); badge.innerHTML='<span class="dot"></span> En vivo · '+window.firebaseOrders.length+' en la nube';
        if(typeof renderOrders==="function") renderOrders();
      }, err=>{ console.warn("Firebase onSnapshot error:",err.message); });
    }
  }catch(e){ console.warn("Firebase no disponible:",e.message); }
</script>
</body>
</html>
